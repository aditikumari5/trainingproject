{% extends 'base.html' %}

{% block content %}

<h1 style="text-align:center; margin-bottom:35px;">
    {{ movie }} Show Timings 🎬
</h1>

<div class="shows-container">

    {% for show in shows %}

    <div class="show-card">

        <h2>{{ movie }}</h2>

        <p>
            ⏰ {{ show.show_time }}
        </p>

        <a
    href="/seats/?show_id={{ show.id }}"
    class="select-btn"
>
    Select Seats
</a>

    </div>

    {% empty %}

    <div class="no-shows">
        No shows available for this movie.
    </div>

    {% endfor %}

</div>

<style>

body{
    background:#0f0f0f;
    color:white;
}

.shows-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:20px;
}

.show-card{
    width:250px;
    background:#1b1b1b;
    padding:25px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 4px 18px rgba(0,0,0,.35);
    transition:0.3s;
}

.show-card:hover{
    transform:translateY(-6px);
}

.show-card h2{
    margin-bottom:15px;
    font-size:24px;
}

.show-card p{
    margin-bottom:18px;
    font-size:18px;
    color:#ddd;
}

.select-btn{
    display:inline-block;
    padding:12px 24px;
    background:#ff4d4d;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.select-btn:hover{
    background:#ff1f1f;
}

.no-shows{
    font-size:20px;
    color:#bbb;
}

</style>

{% endblock %}
