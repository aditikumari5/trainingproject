{% extends 'base.html' %}

{% block content %}

<h1 style="text-align:center;">
    {{ movie }}
</h1>

<div class="timings">

    {% for show in show %}

    <a href="/seats/?show_id={{ show.id }}">

    
    <div class="time-card">
        <span class="time">

        {{ show.show_time }}
        </span>

        <span class="price">
            {% if show.show_time.hour < 12 %}
            ₹120

            {% if show.show_time.hour < 17 %}
            ₹180

            {% else %}
            ₹250

            {% endif %}
        </span>
    </div>
    </a>

    {% endfor %}
</div>

<style>

    body{
        background: #0f0f0f;
        color: white;
    }

    
    .timings{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
    }

    .time-card{
        background: #1f1f1f;
        padding: 20px 30px;
        border-radius: 12px;
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .time-card:hover{
        background: #e50914;
        transform: scale(1.05);
    }

    .time{
        font-size: 20px;
        display: block;
    }

    .price{
        font-size: 14px;
        opacity: 0.7;
    }

    a{
        text-decoration: none;
        color: white;
    }
</style>

{% endlock %}
