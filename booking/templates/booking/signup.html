{% extends "base.html" %}

{% block content %}

<h1>Create Account 🎬</h1>

<form method="POST">
{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required
>

<input
type="email"
name="email"
placeholder="Email"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Sign Up
</button>

</form>

{% if error %}
<p style="text-align:center;">
{{ error }}
</p>
{% endif %}

<p style="text-align:center;">
Already have account?

<a href="/login/">
Login
</a>
</p>

<style>

h1{
text-align:center;
margin-top:30px;
}

form{
width:350px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:12px;
font-size:16px;
}

button{
padding:12px;
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
}

</style>

{% endblock %}
