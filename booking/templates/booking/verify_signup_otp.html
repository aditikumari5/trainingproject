{% extends 'base.html' %}

{% block content %}

<div style="max-width:420px; margin:70px auto; background:#181818; padding:30px; border-radius:18px; box-shadow:0 4px 18px rgba(0,0,0,.35); text-align:center;">

    <h1 style="margin-bottom:20px;">Verify Signup OTP</h1>

    {% if error %}
        <p style="color:#ff6b6b; margin-bottom:15px;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required
            style="width:100%; padding:12px; margin-bottom:18px; border-radius:10px; border:none;"
        >

        <button type="submit" style="width:100%; padding:12px; border:none; border-radius:10px; background:#ff4d4d; color:white; font-weight:bold; cursor:pointer;">
            Verify OTP
        </button>
    </form>

</div>

{% endblock %}
