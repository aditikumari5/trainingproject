{% extends 'base.html' %}

{% block content %}
<h1 style="text-align:center; margin-top:40px;">Payment Page 💳</h1>

<div style="width:420px; margin:40px auto; background:#fff; color:#000; padding:30px; border-radius:16px; text-align:center;">
    <h2>{{ movie_name }}</h2>
    <p>Show Time: {{ show_time }}</p>
    <p>Seats Selected: {{ seats|length }}</p>
    <p>Price per Seat: ₹{{ price_per_seat }}</p>
    <h2>Total Amount: ₹{{ total }}</h2>

    <button id="pay-btn" style="margin-top:20px; padding:12px 28px; border:none; border-radius:8px; background:green; color:white; cursor:pointer;">
        Pay Now
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    const options = {
        key: "{{ razorpay_key }}",
        amount: "{{ total }}00",
        currency: "INR",
        name: "ShowTime",
        description: "{{ movie_name }} Booking",
        order_id: "{{ order_id }}",
        handler: function (response) {
            window.location.href = "/success/";
        },
        theme: {
            color: "#ff4d4d"
        }
    };

    const rzp = new Razorpay(options);

    document.getElementById("pay-btn").onclick = function(e) {
        e.preventDefault();
        rzp.open();
    };
</script>
{% endblock %}
