{% extends "base.html" %}

{% block content %}

<h1>Login with OTP 🔐</h1>

<form method="POST">
{% csrf_token %}

<input
type="text"
name="username"
placeholder="Enter Username"
required
>

<br><br>

<button type="submit">
Send OTP
</button>

</form>


{% if error %}
<p style="color:red;">
{{ error }}
</p>
{% endif %}


<p style="text-align:center;">
New user?

<a href="/signup/">
Create Account
</a>
</p>


<style>

h1{
text-align:center;
margin-top:30px;
}

form{
width:350px;
margin:40px auto;
text-align:center;
}

input{
width:100%;
padding:12px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
}

</style>

{% endblock %}
