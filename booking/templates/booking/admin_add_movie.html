{% extends "base.html" %}

{% block content %}

<h1 style="text-align:center; margin-bottom:30px;">Add Movie ➕</h1>

<form method="POST" style="max-width:700px; margin:0 auto; background:#181818; padding:25px; border-radius:18px;">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Title" required style="width:100%; margin-bottom:12px; padding:12px;">
    <textarea name="overview" placeholder="Overview" required style="width:100%; margin-bottom:12px; padding:12px; height:120px;"></textarea>
    <input type="text" name="poster_path" placeholder="Poster Path" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="text" name="backdrop_path" placeholder="Backdrop Path" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="date" name="release_date" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="number" name="duration" placeholder="Duration" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="number" step="0.1" name="rating" placeholder="Rating" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="number" name="vote_count" placeholder="Vote Count" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="text" name="genre" placeholder="Genre" style="width:100%; margin-bottom:12px; padding:12px;">
    <input type="number" name="tmdb_id" placeholder="TMDb ID" style="width:100%; margin-bottom:12px; padding:12px;">

    <label style="display:block; margin:12px 0;">
        <input type="checkbox" name="is_active" checked>
        Active
    </label>

    <button type="submit" style="padding:12px 24px; background:#ff4d4d; color:white; border:none; border-radius:10px; font-weight:bold;">
        Save Movie
    </button>
</form>

{% endblock %}
