{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center;">Select Your Seats 🎟️</h2>

<form method="POST" action="/book-multiple/">
    {% csrf_token %}

    <div class="screen">SCREEN</div>

    <div class="seats-container">

        {% for seat in seats %}

            <label>
                <input type="checkbox" name="seats" value="{{ seat.id }}">

                <div class="seat 
                    {% if seat.is_booked %}
                        booked
                    {% else %}
                        available
                    {% endif %}
                ">
                    {{ seat.seat_number }}
                </div>
            </label>

        {% endfor %}

    </div>

    <div style="text-align:center; margin-top:20px;">
        <button type="submit" class="pay-btn">
            Proceed to Pay 💳
        </button>
    </div>

</form>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

/* SCREEN */
.screen{
text-align:center;
background:#ccc;
color:black;
padding:10px;
margin:20px auto;
width:60%;
border-radius:10px;
}

/* SEATS GRID */
.seats-container{
display:grid;
grid-template-columns:repeat(10, 1fr);
gap:10px;
justify-items:center;
padding:20px;
}

/* HIDE CHECKBOX */
input[type="checkbox"]{
display:none;
}

/* SEAT BASE */
.seat{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-size:12px;
cursor:pointer;
transition:0.2s;
}

/* AVAILABLE */
.available{
background:#444;
}

.available:hover{
background:#00c853;
}

/* SELECTED */
input[type="checkbox"]:checked + .seat{
background:#00e676;
}

/* BOOKED */
.booked{
background:#b71c1c;
cursor:not-allowed;
}

/* BUTTON */
.pay-btn{
background:#e50914;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.pay-btn:hover{
background:#ff1f2f;
}

</style>

{% endblock %}
