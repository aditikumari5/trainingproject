{% extends "base.html" %}

{% block content %}

<h1 style="text-align:center; margin-bottom:10px;">
    Select Your Seats 🎟
</h1>

<h3 style="text-align:center; color:#ff4d4d; margin-bottom:25px;">
    {{ movie }} | {{ show_time }}
</h3>

<form method="POST" action="/book-multiple/" id="seat-form">

    {% csrf_token %}
    <input type="hidden" name="show_id" value="{{ show.id }}">

    <div class="screen">
        SCREEN
    </div>

    <div class="seat-container">

        {% for seat in seats %}

            <label
                class="seat-label
                {% if seat.is_booked %}
                    booked
                {% elif seat.is_locked %}
                    locked
                {% else %}
                    available
                {% endif %}"
            >

                <input
                    type="checkbox"
                    name="selected_seats"
                    value="{{ seat.seat_number }}"
                    data-price="{{ seat.price }}"

                    {% if seat.is_booked or seat.is_locked %}
                        disabled
                    {% endif %}
                >

                <span class="seat-number">
                    {{ seat.seat_number }}
                </span>

            </label>

        {% endfor %}

    </div>

    <div class="legend">

        <div class="legend-item">
            <span class="legend-box available-box"></span>
            Available
        </div>

        <div class="legend-item">
            <span class="legend-box locked-box"></span>
            Locked
        </div>

        <div class="legend-item">
            <span class="legend-box booked-box"></span>
            Booked
        </div>

    </div>

    <div class="summary-box">

        <h2>Booking Summary</h2>

        <p>
            <strong>Selected Seats:</strong>
            <span id="selected-seats">None</span>
        </p>

        <p>
            <strong>Total Amount:</strong>
            ₹<span id="total-price">0</span>
        </p>

        <button type="submit" class="book-btn">
            Continue to Payment
        </button>

    </div>

</form>

<script>

    const seatInputs = document.querySelectorAll('input[name="selected_seats"]');

    const selectedSeatsText = document.getElementById("selected-seats");
    const totalPriceText = document.getElementById("total-price");

    function updateSummary() {
        let selectedSeats = [];
        let total = 0;

        seatInputs.forEach(seat => {
            if (seat.checked) {
                selectedSeats.push(seat.value);
                total += parseInt(seat.dataset.price);
            }
        });

        selectedSeatsText.innerText =
            selectedSeats.length > 0
            ? selectedSeats.join(", ")
            : "None";

        totalPriceText.innerText = total;
    }

    seatInputs.forEach(seat => {
        seat.addEventListener("change", updateSummary);
    });

</script>

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

.screen{
    width:80%;
    margin:0 auto 40px;
    background:#ddd;
    color:black;
    text-align:center;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
    transform:perspective(300px) rotateX(-10deg);
    box-shadow:0 8px 25px rgba(255,255,255,.2);
}

.seat-container{
    display:grid;
    grid-template-columns:repeat(10, 1fr);
    gap:15px;
    max-width:850px;
    margin:0 auto 40px;
    padding:20px;
}

.seat-label{
    position:relative;
    cursor:pointer;
    text-align:center;
    border-radius:12px;
    padding:16px 0;
    font-weight:bold;
    transition:0.3s;
    user-select:none;
}

.seat-label input{
    display:none;
}

.available{
    background:#27ae60;
}

.available:hover{
    transform:scale(1.05);
}

.available:has(input:checked){
    background:#f1c40f;
    color:black;
}

.booked{
    background:#e74c3c;
    cursor:not-allowed;
    opacity:0.75;
}

.locked{
    background:#f39c12;
    cursor:not-allowed;
    opacity:0.9;
    color:black;
}

.seat-number{
    font-size:15px;
}

.legend{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:10px;
}

.legend-box{
    width:22px;
    height:22px;
    border-radius:5px;
}

.available-box{
    background:#27ae60;
}

.locked-box{
    background:#f39c12;
}

.booked-box{
    background:#e74c3c;
}

.summary-box{
    max-width:420px;
    margin:0 auto;
    background:#181818;
    padding:28px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 4px 18px rgba(0,0,0,.35);
}

.summary-box h2{
    margin-bottom:20px;
}

.summary-box p{
    margin:14px 0;
    font-size:17px;
    color:#ddd;
}

.book-btn{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ff4d4d;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.book-btn:hover{
    background:#ff1f1f;
}

@media(max-width:768px){
    .seat-container{
        grid-template-columns:repeat(5, 1fr);
    }
}

</style>

{% endblock %}
